version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: crop-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    container_name: crop-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/crop_recommendation
      - JWT_SECRET=your_super_secret_jwt_key_change_this
      - AI_SERVICE_URL=http://ai-service:8000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost
    depends_on:
      - mongodb
      - ai-service
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    container_name: crop-ai
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_PORT=8000
      - MODEL_DIR=trained_models
    volumes:
      - ai-models:/app/trained_models
    restart: unless-stopped

  client:
    build: ./client
    container_name: crop-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
  uploads:
  ai-models:
